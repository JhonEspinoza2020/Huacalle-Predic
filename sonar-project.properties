sonar.projectKey=predicthuacalle
sonar.projectName=PredictHuacalle
sonar.sourceEncoding=UTF-8

# Scan scope
sonar.sources=src,src-tauri,backend-sidecar
sonar.tests=tests

# Include useful extensions explicitly
sonar.inclusions=src/**/*.js,src/**/*.jsx,src-tauri/**/*.rs,backend-sidecar/**/*.py
sonar.test.inclusions=tests/**/*.py

# Exclude generated/binary artifacts and documentation from code quality metrics
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.vscode/**,**/__pycache__/**,**/*.pyc,**/*.db,src-tauri/target/**,**/*.md,public/**

# Optional reports (generated before sonar-scanner)
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=pytest-report.xml
